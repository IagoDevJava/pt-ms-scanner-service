# ===================================================================
# MS-SCANNER-SERVICE - Production Configuration
# ===================================================================

spring:
  application:
    name: ms-scanner-service

  # ========== RabbitMQ Configuration ==========
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    connection-timeout: 5000
    requested-heartbeat: 60
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
      retry:
        enabled: true
        initial-interval: 1000ms
        max-attempts: 3
        max-interval: 10000ms
        multiplier: 2.0

  # ========== Feign Client Configuration ==========
  cloud:
    openfeign:
      client:
        config:
          ms-food-library:
            connect-timeout: 5000
            read-timeout: 10000
      httpclient:
        hc5:
          enabled: true

  # ========== Jackson Configuration ==========
  jackson:
    serialization:
      write-dates-as-timestamps: false
      write-durations-as-timestamps: true
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: UTC
    date-format: com.fasterxml.jackson.databind.util.ISO8601DateFormat

# ========== Server Configuration ==========
server:
  port: ${SERVER_PORT:8083}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
    min-response-size: 2048
  tomcat:
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 20000
    max-connections: 10000
    accept-count: 100
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false
  shutdown: graceful

# ========== Logging Configuration ==========
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.egorov.ms_scanner_service: ${LOG_LEVEL_APP:INFO}
    com.egorov.ms_scanner_service.service: ${LOG_LEVEL_SERVICE:INFO}
    org.springframework.amqp: ${LOG_LEVEL_RABBIT:INFO}
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/ms-scanner-service.log}
    max-size: ${LOG_MAX_SIZE:100MB}
    max-history: ${LOG_MAX_HISTORY:30}
    total-size-cap: ${LOG_TOTAL_SIZE:10GB}

# ========== Management (Actuator) ==========
management:
  endpoints:
    web:
      exposure:
        include: ${ACTUATOR_ENDPOINTS:health,info,metrics,prometheus}
        exclude: ${ACTUATOR_EXCLUDE:}
      base-path: ${ACTUATOR_BASE_PATH:/actuator}
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,rabbitmq
        liveness:
          include: livenessState,diskSpace
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
        step: ${PROMETHEUS_STEP:60s}
    tags:
      application: ${spring.application.name}
      environment: ${ENVIRONMENT:prod}
      version: ${APP_VERSION:1.0.0}
    distribution:
      percentiles-histogram:
        http.server.requests: true

# ========== Info Configuration ==========
info:
  app:
    name: ${spring.application.name}
    version: ${APP_VERSION:1.0.0}
    description: "Microservice for product recognition (barcode, OCR, ML)"

# ========== Fallback for feign client ==========
resilience4j:
  circuitbreaker:
    instances:
      foodLibrary:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  timelimiter:
    instances:
      foodLibrary:
        timeout-duration: 2s